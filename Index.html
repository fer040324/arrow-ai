<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arrow AI</title>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
padding:20px;
}

#chat{
height:60vh;
overflow:auto;
margin-bottom:10px;
}

.msg{
background:#1a2240;
padding:10px;
margin:5px;
border-radius:10px;
}

.user{
background:#2563eb;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
}
</style>
</head>

<body>

<h2>Arrow AI</h2>

<div id="chat"></div>

<input id="msg" placeholder="Escribe a tu IA">
<button onclick="send()">Enviar</button>

<script>
async function send(){

let text = msg.value

chat.innerHTML += `<div class="msg user">${text}</div>`

let res = await fetch("/.netlify/functions/ai",{
method:"POST",
body:JSON.stringify({message:text})
})

let data = await res.json()

if(data.image){
chat.innerHTML += `<div class="msg">
<img src="${data.image}" width="200">
</div>`
}else{
chat.innerHTML += `<div class="msg">${data.reply}</div>`
}

msg.value=""
chat.scrollTop=chat.scrollHeight

}
</script>

</body>
</html>
