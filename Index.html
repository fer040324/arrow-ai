<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arrow AI GPT</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
}

#chat{
height:60vh;
overflow:auto;
margin-bottom:10px;
}

.msg{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:10px;
}

.user{
background:#2563eb;
}

input{
width:70%;
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
}
</style>
</head>

<body>

<h2>Arrow AI GPT-4</h2>

<div id="chat"></div>

<input id="msg" placeholder="Escribe a tu IA">
<button onclick="send()">Enviar</button>

<script>
async function send(){

const text = msg.value
if(!text) return

chat.innerHTML += `<div class="msg user">${text}</div>`
msg.value=""

// GPT API
const res = await fetch("/.netlify/functions/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({ message:text })
})

const data = await res.json()

chat.innerHTML += `<div class="msg">${data.reply}</div>`

chat.scrollTop = chat.scrollHeight

}
</script>

</body>
</html>
