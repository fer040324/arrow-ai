<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arrow AI</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
}

#chat{
height:60vh;
overflow:auto;
margin-bottom:15px;
}

.msg{
background:#1e293b;
padding:12px;
margin:6px 0;
border-radius:12px;
}

.user{
background:#2563eb;
}

input{
width:70%;
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Arrow AI</h1>

<div id="chat"></div>

<input id="msg" placeholder="Escribe..." />
<button onclick="send()">Enviar</button>

<script>
async function send(){

const text = msg.value

// mensaje usuario
chat.innerHTML += `<div class="msg user">${text}</div>`

msg.value=""

// llamar IA
<script>
async function send(){

const text = msg.value
if(!text) return

chat.innerHTML += `<div class="msg user">${text}</div>`
msg.value=""

const res = await fetch("/.netlify/functions/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({ message:text })
})

const data = await res.json()

if(data.reply){
chat.innerHTML += `<div class="msg">${data.reply}</div>`
}

if(data.image){
chat.innerHTML += `<div class="msg">
<img src="${data.image}" style="width:100%">
</div>`
}

chat.scrollTop = chat.scrollHeight

}
</script>

const data = await res.json()

// respuesta IA
if(data.reply){
chat.innerHTML += `<div class="msg">${data.reply}</div>`
}

// imagen
if(data.image){
chat.innerHTML += `<div class="msg">
<img src="${data.image}" width="100%">
</div>`
}

chat.scrollTop = chat.scrollHeight

}
</script>

</body>
</html>
