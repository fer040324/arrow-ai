<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow AI GPT-4</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
}

#chat{
height:60vh;
overflow:auto;
margin-bottom:10px;
}

.msg{
background:#1e293b;
padding:12px;
margin:6px 0;
border-radius:12px;
}

.user{
background:#2563eb;
}

input{
width:70%;
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Arrow AI GPT-4</h1>

<div id="chat"></div>

<input id="msg" placeholder="Escribe a tu IA..." />
<button onclick="send()">Enviar</button>

<script>
async function send(){

const text = document.getElementById("msg").value
if(!text) return

const chat = document.getElementById("chat")

chat.innerHTML += `<div class="msg user">${text}</div>`
chat.innerHTML += `<div class="msg" id="loading">Pensando...</div>`

document.getElementById("msg").value=""

try{

const res = await fetch("/.netlify/functions/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({message:text})
})

const data = await res.json()

document.getElementById("loading").remove()

chat.innerHTML += `<div class="msg">${data.reply}</div>`

}catch(e){
document.getElementById("loading").innerText="Error"
}

chat.scrollTop = chat.scrollHeight

}
</script>

</body>
</html>
